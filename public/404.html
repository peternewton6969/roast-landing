<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Roast'n Rake</title>
    <!--
      Single-Page App fallback for GitHub Pages. Deep links (e.g. /mission) hit this
      404 page; we redirect to index.html with the path encoded in the query, and a
      matching snippet in index.html restores it before React Router runs.
      https://github.com/rafgraph/spa-github-pages  (pathSegmentsToKeep = 0 for apex)
    -->
    <script>
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
